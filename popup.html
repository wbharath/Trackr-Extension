<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jobster</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --border: #2a2a3a;
      --accent: #6c63ff;
      --accent-dim: rgba(108,99,255,0.15);
      --success: #22c55e;
      --error: #ef4444;
      --warn: #f59e0b;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --input-bg: #13131c;
    }

    body {
      width: 340px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 26px;
      height: 26px;
      background: var(--accent);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }

    .logo-text {
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      font-size: 14px;
      letter-spacing: -0.3px;
    }

    .logo-text span { color: var(--accent); }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
    }
    .status-dot.online  { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-dot.offline { background: var(--error);   box-shadow: 0 0 6px var(--error); }

    /* ── Tabs ── */
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      padding: 9px;
      text-align: center;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Views ── */
    .view { display: none; padding: 14px 16px; }
    .view.active { display: block; }

    /* ── Login ── */
    .section-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 3px;
    }

    .section-sub {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    /* ── Fields ── */
    .field { margin-bottom: 10px; }

    .field label {
      display: block;
      font-size: 10px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .field input,
    .field select {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus,
    .field select:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--muted); }
    .field select option { background: var(--surface); }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 9px;
      border-radius: 8px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #7b74ff; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      margin-top: 8px;
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

    .btn-danger {
      background: rgba(239,68,68,0.1);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.2);
      margin-top: 8px;
    }
    .btn-danger:hover { background: rgba(239,68,68,0.2); }

    /* ── Toast ── */
    .toast {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 11px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 11px;
    }
    .toast.show { display: flex; }
    .toast.success { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.3); color: var(--success); }
    .toast.error   { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: var(--error); }
    .toast.info    { background: rgba(108,99,255,0.12); border: 1px solid rgba(108,99,255,0.3); color: var(--accent); }

    /* ── Scrape badge ── */
    .scrape-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--accent);
      background: var(--accent-dim);
      border-radius: 4px;
      padding: 2px 7px;
      margin-bottom: 10px;
      font-family: 'DM Mono', monospace;
    }

    /* ── Logout row ── */
    .logout-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .logout-user {
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    .logout-btn {
      font-size: 11px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      padding: 3px 8px;
      border-radius: 5px;
      transition: all 0.15s;
    }
    .logout-btn:hover { color: var(--error); background: rgba(239,68,68,0.1); }

    /* ── Gmail section ── */
    .user-card {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      margin-bottom: 12px;
    }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
      flex-shrink: 0;
    }

    .user-info .name  { font-weight: 500; font-size: 12px; }
    .user-info .email { font-size: 11px; color: var(--muted); margin-top: 1px; }

    /* ── Sync log ── */
    #syncLog {
      display: none;
      margin-top: 10px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 11px;
      color: var(--muted);
      max-height: 90px;
      overflow-y: auto;
      font-family: 'DM Mono', monospace;
      line-height: 1.7;
    }

    #syncLog .log-line { display: flex; gap: 6px; }
    #syncLog .log-line.success .msg { color: var(--success); }
    #syncLog .log-line.error   .msg { color: var(--error); }
    #syncLog .log-line.info    .msg { color: var(--accent); }

    #lastSyncText {
      font-size: 11px;
      color: #4b5563;
      text-align: center;
      margin-top: 10px;
    }

    .spinner {
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .spinner.spinning { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Success view ── */
    .success-view {
      text-align: center;
      padding: 20px 16px;
    }
    .success-icon { font-size: 34px; margin-bottom: 8px; }
    .success-title { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
    .success-sub { color: var(--muted); font-size: 12px; margin-bottom: 14px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">💼</div>
      <div class="logo-text">job<span>ster</span></div>
    </div>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <!-- Tabs (hidden on login/success) -->
  <div class="tabs" id="tabBar" style="display:none">
    <div class="tab active" id="tabTracker">💾 Save Job</div>
    <div class="tab" id="tabGmail">✉️ Gmail Sync</div>
  </div>

  <!-- ── LOGIN VIEW ── -->
  <div class="view active" id="loginView">
    <p class="section-title">Connect to Jobster</p>
    <p class="section-sub">Sign in to save jobs and sync your Gmail.</p>
    <div id="loginToast" class="toast"></div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" />
    </div>
    <button class="btn btn-primary" id="loginBtn">Sign In</button>
  </div>

  <!-- ── TRACKER VIEW ── -->
  <div class="view" id="trackerView">
    <div id="jobToast" class="toast"></div>
    <div class="scrape-badge" id="scrapeBadge">✦ auto-detected from page</div>

    <div class="field">
      <label>Position</label>
      <input type="text" id="position" placeholder="e.g. Frontend Developer" />
    </div>
    <div class="field">
      <label>Company</label>
      <input type="text" id="company" placeholder="e.g. Acme Corp" />
    </div>
    <div class="field">
      <label>Location</label>
      <input type="text" id="jobLocation" placeholder="e.g. Toronto, ON" />
    </div>
    <div class="row">
      <div class="field">
        <label>Job Type</label>
        <select id="jobType">
          <option value="full-time">Full-time</option>
          <option value="part-time">Part-time</option>
          <option value="remote">Remote</option>
          <option value="internship">Internship</option>
        </select>
      </div>
      <div class="field">
        <label>Status</label>
        <select id="status">
          <option value="APPLIED">Applied</option>
          <option value="INTERVIEW">Interview</option>
          <option value="REJECTED">Rejected</option>
          <option value="OFFER">Offer</option>
        </select>
      </div>
    </div>

    <button class="btn btn-primary" id="saveBtn">Save Job</button>

    <div class="logout-row">
      <span class="logout-user" id="loggedInEmail"></span>
      <button class="logout-btn" id="logoutBtn">Sign out</button>
    </div>
  </div>

  <!-- ── GMAIL SYNC VIEW ── -->
  <div class="view" id="gmailView">

    <!-- Not connected -->
    <div id="gmailConnectSection">
      <p class="section-sub">Connect Gmail to auto-detect job emails and sync them to Jobster.</p>
      <button class="btn btn-primary" id="btnConnect">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,12 2,6"/>
        </svg>
        Connect Gmail
      </button>
    </div>

    <!-- Connected -->
    <div id="gmailSyncSection" style="display:none">
      <div class="user-card" id="gmailUserCard">
        <div class="avatar" id="gmailAvatarInitials">?</div>
        <div class="user-info">
          <div class="name"  id="gmailUserName">—</div>
          <div class="email" id="gmailUserEmail">—</div>
        </div>
      </div>

      <button class="btn btn-primary" id="btnSync">
        <div class="spinner" id="syncSpinner"></div>
        <svg id="syncIcon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        Sync Emails
      </button>
      <button class="btn btn-danger" id="btnDisconnect">Disconnect Gmail</button>

      <div id="syncLog"></div>
      <div id="lastSyncText"></div>
    </div>
  </div>

  <!-- ── SUCCESS VIEW ── -->
  <div class="view" id="successView">
    <div class="success-view">
      <div class="success-icon">✅</div>
      <p class="success-title">Job Saved!</p>
      <p class="success-sub" id="successMsg"></p>
      <button class="btn btn-primary" id="addAnotherBtn">Add Another</button>
      <button class="btn btn-ghost"   id="closeBtn">Close</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
